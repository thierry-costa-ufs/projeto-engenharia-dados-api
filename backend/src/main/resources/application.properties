# GERAL
spring.application.name=universidade

# HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PERSISTENCIA RELACIONAL
spring.datasource.url=jdbc:postgresql://IP_DO_BANCO:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=SENHA_DO_BANCO
spring.datasource.driver-class-name=org.postgresql.Driver

# PERSISTENCIA NOSQL
spring.data.mongodb.uri=mongodb://IP_DO_BANCO:27017/universidade

# OUTROS
spring.data.web.pageable.page-serialization-mode=via-dto
spring.data.web.pageable.max-page-size=200

# SEGURANCA (CORS)
app.security.cors.allowed-origins=*