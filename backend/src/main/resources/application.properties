spring.application.name=engdados

# Configuracoes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 1. PERSISTENCIA RELACIONAL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/engdados_db
spring.datasource.username=postgres
spring.datasource.password=costa
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 2. PERSISTENCIA NOSQL
# ===================================================================
spring.mongodb.uri=mongodb://localhost:27017/engdados_db

spring.data.web.pageable.page-serialization-mode=via-dto