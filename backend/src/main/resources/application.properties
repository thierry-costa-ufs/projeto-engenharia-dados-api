# GERAL
spring.application.name=universidade

# HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PERSISTENCIA RELACIONAL
spring.datasource.url=jdbc:postgresql://ENDPOINT_DO_BANCO
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# PERSISTENCIA NOSQL
spring.data.mongodb.uri=mongodb://IP_DO_BANCO/universidade

# OUTROS
spring.data.web.pageable.page-serialization-mode=via-dto
spring.data.web.pageable.max-page-size=200

# SEGURANCA (CORS)
app.security.cors.allowed-origins=*